services:
  - type: web
    name: krishisense-api
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GEMINI_API_KEY
        fromEnv: GEMINI_API_KEY
      - key: FIREBASE_CONFIG
        fromEnv: FIREBASE_CONFIG
